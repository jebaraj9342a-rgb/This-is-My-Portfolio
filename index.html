<!DOCTYPE html>
<html>
<head>
<title>Pro Presenter Ultimate+</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tamil Font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Noto Sans Tamil','Segoe UI', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* MAIN */
#app {
    width: 95%;
    height: 95vh;
    border-radius: 20px;
    display: flex;
    overflow: hidden;
    backdrop-filter: blur(20px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}

/* LEFT */
#leftPanel {
    width: 30%;
    padding: 15px;
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.05);
}

#inputArea {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

/* CENTER */
#centerPanel {
    width: 50%;
    display: flex;
    flex-direction: column;
}

#previewPanel {
    height: 30%;
    background: black;
    position: relative;
}

/* SLIDES GRID */
#bottomPanel {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 10px;
    padding: 10px;
    overflow-y: auto;
}

/* RIGHT */
#historyPanel {
    width: 20%;
    padding: 10px;
    overflow-y: auto;
    background: rgba(0,0,0,0.4);
    color: white;
}

/* SLIDE */
.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    opacity:0;
    transition:0.4s;
}
.slide.active { opacity:1; }

/* TEXT */
.slideText {
    color: white;
    font-size: 26px;
    text-align: center;
    max-width: 90%;
    margin-bottom: 40px;
    line-height: 1.6;
}

/* THUMB */
.slideItem {
    height:100px;
    background: rgba(255,255,255,0.08);
    padding:8px;
    cursor:pointer;
    border-radius:10px;
    color:white;
}
.slideItem.active {
    border:2px solid #00c6ff;
}

/* BUTTON */
button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* MOBILE */
@media(max-width:900px){
    #app{
        flex-direction: column;
    }
    #leftPanel,#centerPanel,#historyPanel{
        width:100%;
    }
}
</style>
</head>

<body>

<div id="app">

<!-- LEFT -->
<div id="leftPanel">
    <textarea id="inputArea" placeholder="Paste lyrics..."></textarea>
    <button onclick="generateSlides()">Generate</button>
    <button id="openBtn">Open Output</button>
</div>

<!-- CENTER -->
<div id="centerPanel">
    <div id="previewPanel"></div>
    <div id="bottomPanel"></div>
</div>

<!-- RIGHT -->
<div id="historyPanel">
    <h3>Recent Songs</h3>
</div>

</div>

<script>
let slides=[];
let currentIndex=0;
let outputWindow=null;

/* RENDER */
function renderSlides(data){
    let preview=document.getElementById("previewPanel");
    let bottom=document.getElementById("bottomPanel");

    preview.innerHTML="";
    bottom.innerHTML="";

    data.forEach((s,i)=>{
        let slide=document.createElement("div");
        slide.className="slide";

        let text=document.createElement("div");
        text.className="slideText";
        text.innerText=s;

        slide.appendChild(text);
        preview.appendChild(slide);

        let thumb=document.createElement("div");
        thumb.className="slideItem";
        thumb.innerText=s.substring(0,60);
        thumb.onclick=()=>showSlide(i);
        bottom.appendChild(thumb);
    });

    setTimeout(()=>showSlide(0),50);
}

/* GENERATE */
function generateSlides(){
    let text=document.getElementById("inputArea").value.trim();
    if(!text) return;

    slides = text.split(/\n\s*\n/).filter(s=>s);

    localStorage.setItem("history", JSON.stringify([{text,slides}]));

    renderSlides(slides);
    loadHistory();
}

/* HISTORY */
function loadHistory(){
    let panel=document.getElementById("historyPanel");
    panel.innerHTML="<h3>Recent Songs</h3>";

    let history=JSON.parse(localStorage.getItem("history")||"[]");

    history.forEach(item=>{
        let div=document.createElement("div");
        div.className="historyItem";
        div.innerText=item.text.substring(0,50);

        div.onclick=()=>{
            document.getElementById("inputArea").value=item.text;
            slides=item.slides;
            renderSlides(slides);
        };

        panel.appendChild(div);
    });
}

/* SHOW */
function showSlide(i){
    if(i<0 || i>=slides.length) return;

    currentIndex=i;

    document.querySelectorAll(".slide").forEach((s,idx)=>{
        s.classList.toggle("active",idx===i);
    });

    document.querySelectorAll(".slideItem").forEach((s,idx)=>{
        s.classList.toggle("active",idx===i);
    });

    if(outputWindow && !outputWindow.closed){
        outputWindow.postMessage({slide:slides[i]},"*");
    }
}

/* OUTPUT */
function openOutput(){
    outputWindow = window.open("", "_blank");

    outputWindow.document.write(`
        <body style="margin:0;background:black;color:white;
        font-family:'Noto Sans Tamil';
        font-size:60px;
        display:flex;justify-content:center;align-items:flex-end;
        height:100vh;text-align:center;padding-bottom:200px;">
        <div id="slide"></div>

        <script>
        window.addEventListener("message",e=>{
            document.getElementById("slide").innerText=e.data.slide;
        });
        <\/script>
    `);
}

/* FIX POPUP BLOCK */
document.getElementById("openBtn").addEventListener("click", openOutput);

/* KEYBOARD */
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowRight") showSlide(currentIndex+1);
    if(e.key==="ArrowLeft") showSlide(currentIndex-1);
});

/* INIT */
loadHistory();
</script>

</body>
</html>
